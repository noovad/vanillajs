<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: Arial;
        }
    </style>
</head>

<body>

    <h2>User List</h2>

    <div id="loading">
        Loading...
    </div>

    <ul id="users"></ul>

    <script>
        const loading =
            document.getElementById("loading");

        const usersEl =
            document.getElementById("users");

        async function loadUsers() {

            try {

                const response =
                    await fetch(
                        "https://jsonplaceholder.typicode.com/users"
                    );

                const users =
                    await response.json();

                usersEl.innerHTML =
                    users.map(user => `
                <li>
                    ${user.name}
                </li>
            `).join("");

            } catch (error) {

                usersEl.innerHTML =
                    "<p>Failed load users</p>";

            } finally {

                loading.style.display =
                    "none";
            }
        }

        loadUsers();
    </script>

</body>

</html>
