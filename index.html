<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.ico" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/atom-one-light.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>JavaScript Gallery</title>

    <style type="text/tailwindcss">
      @layer utilities {
        .active-menu {
          @apply bg-black text-white;
        }
      }
    </style>
  </head>

  <body class="flex h-screen overflow-hidden">
    <aside class="flex flex-col w-[280px] border-e-2">
      <div class="logo text-2xl font-bold p-4 pb-2">JS Components</div>
      <hr />
      <nav id="menu" class="grid font-medium p-4 text-lg space-y-4 overflow-y-scroll"></nav>
    </aside>
    <main class="flex-1 overflow-hidden">
      <button id="toggleMode" class="fixed top-4 right-4 bg-white p-2 rounded text-xl font-extrabold border-2"></button>
      <iframe id="viewer" class="w-full h-full"> </iframe>
      <pre
        id="codePanel"
        class="w-full h-full overflow-y-auto whitespace-pre-wrap break-words"
      ><code id="codeContent"></code></pre>
    </main>
    <script>
      const pages = [
        ["learn-1", "# Learn 1"],
        ["01-counter", "1. Counter"],
        ["02-toggle-theme", "2. Toggle Theme"],
        ["03-modal", "3. Modal"],
        ["04-dropdown", "4. Dropdown"],
        ["05-accordion", "5. Accordion"],
        ["06-tabs", "6. Tabs"],
        ["07-sidebar", "7. Sidebar"],
        ["08-todo-list", "8. Todo List"],
        ["09-toast", "9. Toast"],
        ["10-tooltip", "10. Tooltip"],
        ["11-search-filter", "11. Search Filter"],
        ["12-pagination", "12. Pagination"],
        ["13-fetch-user-list", "13. Fetch User List"],
        ["14-crud-user", "14. CRUD User"],
        ["15-autocomplete", "15. Autocomplete"],
        ["16-infinite-scroll", "16. Infinite Scroll"],
        // ["17-multi-select", "17. Multi Select"],
        // ["18-drag-and-drop", "18. Drag and Drop"],
        // ["19-kanban-board", "19. Kanban Board"],
        // ["20-date-picker", "20. Date Picker"],
      ];
      const menu = document.getElementById("menu");
      const viewer = document.getElementById("viewer");
      const codePanel = document.getElementById("codePanel");
      const codeContent = document.getElementById("codeContent");
      const toggleMode = document.getElementById("toggleMode");

      let currentMode = "code";

      pages.forEach(([slug, title], i) => {
        const a = document.createElement("a");
        a.href = `/#${slug}`;
        a.textContent = `➜ ${title}`;
        a.classList.add(..."border rounded p-2".split(" "));
        menu.appendChild(a);
      });

      async function loadPage() {
        const slug = location.hash.replace("#", "") || "01-counter";
        menu.querySelectorAll("a").forEach((a) => {
          a.classList.toggle("active-menu", a.getAttribute("href") === `/#${slug}`);
        });
        const file = `pages/${slug}.html`;
        viewer.src = file;
        try {
          const response = await fetch(file);
          const html = await response.text();
          codeContent.removeAttribute("data-highlighted");
          codeContent.textContent = html;
          hljs.highlightElement(codeContent);
        } catch {
          codeContent.textContent = "Failed to load source code.";
        }
      }

      function setMode() {
        if (currentMode === "preview") {
          currentMode = "code";
          toggleMode.textContent = "Preview";
          codePanel.classList.remove("hidden");
          viewer.classList.add("hidden");
        } else {
          currentMode = "preview";
          toggleMode.textContent = "CODE";
          viewer.classList.remove("hidden");
          codePanel.classList.add("hidden");
        }
      }

      toggleMode.addEventListener("click", setMode);

      window.addEventListener("hashchange", loadPage);
      setMode();
      loadPage();
    </script>
  </body>
</html>
