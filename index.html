<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>JavaScript Components Gallery</title>
    <style type="text/tailwindcss">
      @layer utilities {
        .active-menu {
          @apply bg-black text-white;
        }
      }
    </style>
  </head>

  <body class="flex h-screen overflow-hidden">
    <aside class="flex flex-col w-[280px] border-e-2">
      <div class="logo text-2xl font-bold p-4 pb-2">JS Components</div>
      <hr />
      <nav id="menu" class="grid font-medium p-4 text-lg space-y-4 overflow-y-scroll"></nav>
    </aside>
    <main class="flex-1 h-full overflow-auto">
      <button
        id="toggleMode"
        class="absolute top-4 right-4 bg-white p-2 rounded text-xl font-extrabold border-2"
      ></button>
      <iframe id="viewer" class="w-full h-full"> </iframe>
      <pre id="codePanel" class="m-8"> <code id="codeContent"></code> </pre>
    </main>
    <script>
      const pages = [
        ["01-counter", "Counter"],
        ["02-toggle-theme", "Toggle Theme"],
        ["03-modal", "Modal"],
        ["04-dropdown", "Dropdown"],
        ["05-accordion", "Accordion"],
        ["06-tabs", "Tabs"],
        ["07-sidebar", "Sidebar"],
        ["08-todo-list", "Todo List"],
        ["09-toast", "Toast"],
        ["10-tooltip", "Tooltip"],
        ["11-search-filter", "Search Filter"],
        ["12-pagination", "Pagination"],
        ["13-fetch-user-list", "Fetch User List"],
        ["14-crud-user", "CRUD User"],
        ["15-autocomplete", "Autocomplete"],
        ["16-infinite-scroll", "Infinite Scroll"],
        ["17-multi-select", "Multi Select"],
        ["18-drag-and-drop", "Drag and Drop"],
        ["19-kanban-board", "Kanban Board"],
        ["20-date-picker", "Date Picker"],
      ];
      const menu = document.getElementById("menu");
      const viewer = document.getElementById("viewer");
      const codePanel = document.getElementById("codePanel");
      const codeContent = document.getElementById("codeContent");
      const toggleMode = document.getElementById("toggleMode");

      let currentMode = "code";

      pages.forEach(([slug, title], i) => {
        const a = document.createElement("a");
        a.href = `#/${slug}`;
        a.textContent = `➜ ${i + 1}. ${title}`;
        a.classList.add(..."border rounded p-2".split(" "));
        menu.appendChild(a);
      });

      async function loadPage() {
        const slug = location.hash.replace("#/", "") || "01-counter";
        menu.querySelectorAll("a").forEach((a) => {
          a.classList.toggle("active-menu", a.getAttribute("href") === `#/${slug}`);
        });
        const file = `pages/${slug}.html`;
        viewer.src = file;
        try {
          const response = await fetch(file);
          const html = await response.text();
          codeContent.textContent = html;
        } catch {
          codeContent.textContent = "Failed to load source code.";
        }
      }

      function setMode() {
        if (currentMode === "preview") {
          currentMode = "code";
          toggleMode.textContent = "Preview";
          codePanel.classList.remove("hidden");
          viewer.classList.add("hidden");
        } else {
          currentMode = "preview";
          toggleMode.textContent = "CODE";
          viewer.classList.remove("hidden");
          codePanel.classList.add("hidden");
        }
      }

      toggleMode.addEventListener("click", setMode);

      window.addEventListener("hashchange", loadPage);
      setMode();
      loadPage();
    </script>
  </body>
</html>
