<!DOCTYPE html>
<html>

<head>
    <title>Counter</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .counter {
            text-align: center;
        }

        h1 {
            font-size: 60px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="counter">
        <h1 id="count">0</h1>

        <button id="decrease">-</button>
        <button id="increase">+</button>
    </div>

    <script>
        let count = 0;

        const countEl = document.getElementById("count");

        function render() {
            countEl.textContent = count;
        }

        document.getElementById("increase").addEventListener("click", () => {
            count++;
            render();
        });

        document.getElementById("decrease").addEventListener("click", () => {
            count--;
            render();
        });

        render();
    </script>

</body>

</html>
