<!doctype html>
<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply h-screen flex justify-center;
        }
        main {
          @apply my-20 overflow-auto w-xl border p-4 rounded-lg;
        }
      }

      @layer utilities {
        .item {
          @apply p-4 border-b border-gray-200 font-medium;
        }
        #loader {
          @apply text-center p-5;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div id="list"></div>
      <div id="loader">Loading...</div>
    </main>
    <script>
      const list = document.getElementById("list");
      const loader = document.getElementById("loader");
      let page = 1;
      function loadItems() {
        const items = Array.from({ length: 10 }, (_, i) => `Item ${(page - 1) * 10 + i + 1}`);
        items.forEach((item) => {
          const div = document.createElement("div");
          div.className = "item";
          div.textContent = item;
          list.appendChild(div);
        });
        page++;
      }

      const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting) {
          setTimeout(() => {
            loadItems();
          }, 500);
        }
      });
      observer.observe(loader);
      loadItems();
    </script>
  </body>
</html>
