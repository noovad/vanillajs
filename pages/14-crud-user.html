<!doctype html>
<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply h-screen grid place-items-center;
        }
        button {
          @apply px-6 cursor-pointer border font-medium text-lg rounded-lg;
        }
        input {
          @apply border rounded-md py-1 px-2;
        }
        li {
          @apply flex justify-between my-2;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <form id="form">
        <input id="name" placeholder="User name" required />
        <button>Add</button>
      </form>
      <ul id="list"></ul>
    </main>
    <script>
      let users = ["John", "Sarah"];
      const form = document.getElementById("form");
      const list = document.getElementById("list");
      function render() {
        list.innerHTML = users
          .map(
            (user, index) => `
            <li>
                ${user}
                <button
                    data-index="${index}">
                    Delete
                </button>
            </li>
        `,
          )
          .join("");
      }
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        users.push(document.getElementById("name").value);
        form.reset();
        render();
      });
      list.addEventListener("click", (e) => {
        if (e.target.dataset.index) {
          users.splice(e.target.dataset.index, 1);
          render();
        }
      });
      render();
    </script>
  </body>
</html>
