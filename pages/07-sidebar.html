<!doctype html>
<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply h-screen grid place-items-center;
        }
        button {
          @apply px-6 cursor-pointer border font-medium text-lg rounded-lg;
        }
      }
      .sidebar {
        @apply fixed -left-[250px] top-0 w-[250px] h-screen bg-gray-900 text-white transition-all duration-300 text-center pt-12;
      }
      .sidebar.open {
        @apply left-0;
      }
      .overlay {
        @apply fixed inset-0 bg-black/50 hidden;
      }
      .overlay.show {
        @apply block;
      }
    </style>
  </head>
  <body>
    <button class="menu-btn">Open Sidebar</button>
    <div class="overlay"></div>
    <div class="sidebar">
      <span>This is sidebar</span>
    </div>
    <script>
      const sidebar = document.querySelector(".sidebar");
      const overlay = document.querySelector(".overlay");
      const btn = document.querySelector(".menu-btn");
      btn.addEventListener("click", () => {
        sidebar.classList.add("open");
        overlay.classList.add("show");
      });
      overlay.addEventListener("click", () => {
        sidebar.classList.remove("open");
        overlay.classList.remove("show");
      });
    </script>
  </body>
</html>
