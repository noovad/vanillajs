<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .sidebar {
            position: fixed;
            left: -250px;
            top: 0;
            width: 250px;
            height: 100vh;
            background: #222;
            color: white;
            transition: .3s;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar ul {
            list-style: none;
            padding: 20px;
        }

        .sidebar li {
            margin-bottom: 15px;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .4);
            display: none;
        }

        .overlay.show {
            display: block;
        }

        .menu-btn {
            margin: 20px;
        }
    </style>
</head>

<body>

    <button class="menu-btn">
        Open Sidebar
    </button>

    <div class="overlay"></div>

    <div class="sidebar">
        <ul>
            <li>Dashboard</li>
            <li>Users</li>
            <li>Settings</li>
        </ul>
    </div>

    <script>
        const sidebar =
            document.querySelector(".sidebar");

        const overlay =
            document.querySelector(".overlay");

        const btn =
            document.querySelector(".menu-btn");

        btn.addEventListener("click", () => {
            sidebar.classList.add("open");
            overlay.classList.add("show");
        });

        overlay.addEventListener("click", () => {
            sidebar.classList.remove("open");
            overlay.classList.remove("show");
        });
    </script>

</body>

</html>
