<!doctype html>
<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply h-screen flex justify-center mt-20;
        }
        input {
          @apply border rounded-md w-xs px-4 py-2;
        }
        li {
          @apply border rounded-md my-2 px-2 py-1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <input id="search" placeholder="Search user..." />
      <ul id="list"></ul>
    </main>
    <script>
      const users = ["John", "Jane", "Michael", "Sarah", "David", "Alex", "Emma"];
      const search = document.getElementById("search");
      const list = document.getElementById("list");
      function render(data) {
        list.innerHTML = data.map((user) => `<li>${user}</li>`).join("");
      }
      search.addEventListener("input", () => {
        const keyword = search.value.toLowerCase();
        const filtered = users.filter((user) => user.toLowerCase().includes(keyword));
        render(filtered);
      });
      render(users);
    </script>
  </body>
</html>
