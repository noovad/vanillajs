<!doctype html>
<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply h-screen grid place-items-center;
        }
        button {
          @apply px-4 py-1 cursor-pointer border-2 font-bold text-xl rounded-lg;
        }
      }
      @layer utilities {
        .dropdown {
          @apply relative w-52;
        }
        .menu {
          @apply hidden absolute rounded-md w-full border border-gray-300 bg-white;
        }
        .menu.active {
          @apply block mt-2;
        }
        .item {
          @apply p-2.5 cursor-pointer;
        }
        .item:hover {
          @apply bg-gray-200;
        }
      }
    </style>
  </head>
  <body>
    <div class="dropdown">
      <button id="toggleBtn">Select Menu</button>
      <div class="menu" id="menu">
        <div class="item">Profile</div>
        <div class="item">Settings</div>
        <div class="item">Logout</div>
      </div>
    </div>
    <script>
      const btn = document.getElementById("toggleBtn");
      const menu = document.getElementById("menu");
      btn.addEventListener("click", () => {
        menu.classList.toggle("active");
      });
      document.addEventListener("click", (e) => {
        const insideDropdown = e.target.closest(".dropdown");

        if (!insideDropdown) {
          menu.classList.remove("active");
        }
      });
    </script>
  </body>
</html>
