<!doctype html>
<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply h-screen grid place-items-center;
        }
      }

      @layer utilities {
        .tabs {
          @apply flex gap-3 w-lg justify-around;
        }
        .tab-btn {
          @apply px-2 py-4 w-full rounded-md font-medium cursor-pointer;
        }
        .tab-btn.active {
          @apply bg-black text-white;
        }
        .tab-content {
          @apply hidden py-8 text-center font-medium bg-gray-300 rounded-md;
        }
        .tab-content.active {
          @apply block;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="tabs">
        <button class="tab-btn active" data-tab="1">Profile</button>
        <button class="tab-btn" data-tab="2">Settings</button>
        <button class="tab-btn" data-tab="3">About</button>
      </div>
      <div class="tab-content active" data-content="1">Profile Content</div>
      <div class="tab-content" data-content="2">Settings Content</div>
      <div class="tab-content" data-content="3">About Content</div>
    </main>
    <script>
      const buttons = document.querySelectorAll(".tab-btn");
      const contents = document.querySelectorAll(".tab-content");
      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          const tab = button.dataset.tab;
          buttons.forEach((btn) => btn.classList.remove("active"));
          contents.forEach((content) => content.classList.remove("active"));
          button.classList.add("active");
          document.querySelector(`[data-content="${tab}"]`).classList.add("active");
        });
      });
    </script>
  </body>
</html>
