<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: Arial;
        }

        .accordion {
            width: 500px;
            margin: 40px auto;
        }

        .item {
            border: 1px solid #ddd;
            margin-bottom: 10px;
        }

        .header {
            padding: 15px;
            cursor: pointer;
            background: #f5f5f5;
        }

        .content {
            display: none;
            padding: 15px;
        }

        .content.active {
            display: block;
        }
    </style>
</head>

<body>

    <div class="accordion" id="accordion">

        <div class="item">
            <div class="header">
                What is JavaScript?
            </div>

            <div class="content">
                JavaScript is a programming language.
            </div>
        </div>

        <div class="item">
            <div class="header">
                What is DOM?
            </div>

            <div class="content">
                DOM stands for Document Object Model.
            </div>
        </div>

        <div class="item">
            <div class="header">
                What is Fetch API?
            </div>

            <div class="content">
                Fetch API is used for HTTP requests.
            </div>
        </div>

    </div>

    <script>
        const accordion =
            document.getElementById("accordion");

        accordion.addEventListener("click", (e) => {

            const header =
                e.target.closest(".header");

            if (!header) return;

            const content =
                header.nextElementSibling;

            content.classList.toggle("active");
        });
    </script>

</body>

</html>
