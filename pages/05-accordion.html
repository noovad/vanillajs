<!doctype html>
<html>
  <head>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply h-screen grid place-items-center;
        }
      }

      @layer utilities {
        .accordion {
          @apply w-lg;
        }
        .item {
          @apply border border-gray-300 mb-2;
        }
        .header {
          @apply p-4 cursor-pointer bg-gray-100;
        }
        .content {
          @apply hidden p-4;
        }
        .content.active {
          @apply block;
        }
      }
    </style>
  </head>
  <body>
    <div class="accordion" id="accordion">
      <div class="item">
        <div class="header">What is JavaScript?</div>
        <div class="content">JavaScript is a programming language.</div>
      </div>
      <div class="item">
        <div class="header">What is DOM?</div>
        <div class="content">DOM stands for Document Object Model.</div>
      </div>
      <div class="item">
        <div class="header">What is Fetch API?</div>
        <div class="content">Fetch API is used for HTTP requests.</div>
      </div>
    </div>
    <script>
      const accordion = document.getElementById("accordion");
      accordion.addEventListener("click", (e) => {
        const header = e.target.closest(".header");
        if (!header) return;
        const currentContent = header.nextElementSibling;

        accordion.querySelectorAll(".content").forEach((content) => {
          if (content !== currentContent) {
            content.classList.remove("active");
          }
        });

        currentContent.classList.toggle("active");
      });
    </script>
  </body>
</html>
