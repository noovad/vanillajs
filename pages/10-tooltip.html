<!DOCTYPE html>
<html>

<head>
    <style>
        .tooltip {
            position: fixed;
            background: #333;
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
        }
    </style>
</head>

<body>

    <p>
        Hover
        <span data-tooltip="Tooltip Example" class="target">
            this text
        </span>
    </p>

    <div class="tooltip"></div>

    <script>
        const tooltip =
            document.querySelector(".tooltip");

        document
            .querySelector(".target")
            .addEventListener("mouseenter", (e) => {

                tooltip.style.display = "block";

                tooltip.textContent =
                    e.target.dataset.tooltip;
            });

        document
            .querySelector(".target")
            .addEventListener("mousemove", (e) => {

                tooltip.style.left =
                    e.clientX + 15 + "px";

                tooltip.style.top =
                    e.clientY + 15 + "px";
            });

        document
            .querySelector(".target")
            .addEventListener("mouseleave", () => {

                tooltip.style.display = "none";
            });
    </script>

</body>

</html>
