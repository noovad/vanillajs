<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
        }

        .tab-btn {
            padding: 10px 15px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #333;
            color: white;
        }

        .tab-content {
            display: none;
            margin-top: 20px;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>

<body>

    <div class="tabs">
        <button class="tab-btn active" data-tab="1">Profile</button>
        <button class="tab-btn" data-tab="2">Settings</button>
        <button class="tab-btn" data-tab="3">About</button>
    </div>

    <div class="tab-content active" data-content="1">
        Profile Content
    </div>

    <div class="tab-content" data-content="2">
        Settings Content
    </div>

    <div class="tab-content" data-content="3">
        About Content
    </div>

    <script>
        const buttons = document.querySelectorAll(".tab-btn");
        const contents = document.querySelectorAll(".tab-content");

        buttons.forEach(button => {
            button.addEventListener("click", () => {

                const tab = button.dataset.tab;

                buttons.forEach(btn =>
                    btn.classList.remove("active")
                );

                contents.forEach(content =>
                    content.classList.remove("active")
                );

                button.classList.add("active");

                document
                    .querySelector(`[data-content="${tab}"]`)
                    .classList.add("active");
            });
        });
    </script>

</body>

</html>
